{% extends "base.html" %} {% block content %}

<h2 class="text-center mb-4">{{ _('Upload Image') }}</h2>

<form id="upload-file" method="post" enctype="multipart/form-data">
  <div class="upload-area" id="drop-area">
    <p>{{ _('Drag & Drop here') }}</p>
    <p>{{ _('or') }}</p>

    <label for="imageUpload" class="upload-label">
      {{ _('Choose Image') }}
    </label>

    <input type="file" name="file" id="imageUpload" accept=".png,.jpg,.jpeg" />
  </div>
</form>

<div class="image-section">
  <div class="img-preview">
    <div id="imagePreview"></div>
  </div>

  <button class="btn btn-success btn-lg" id="btn-predict">
    {{ _('Detect Disease') }}
  </button>
</div>

<div class="loader"></div>

<div id="result-card" class="result-card">
  <h3 id="crop"></h3>
  <h4 id="disease"></h4>
  <p id="confidence"></p>
</div>

<!-- Advisory Suggestion for auto chatbot response -->
<div id="advisory-prompt" class="mt-3 text-center" style="display: none">
  <p>🌿 {{ _('Do you want treatment suggestions?') }}</p>

  <button class="btn btn-success" id="get-advisory">
    {{ _('Yes, Show Treatment') }}
  </button>
</div>

{% endblock %}
