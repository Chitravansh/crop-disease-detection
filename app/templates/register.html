{% extends "base.html" %} {% block content %}

<div class="auth-card">
  <h3 class="text-center mb-4">
    <i class="fas fa-user-plus"></i> {{ _('Create Account') }}
  </h3>

  <form method="POST">
    <div class="form-group">
      <label>{{ _('Name') }}</label>

      <input type="text" name="name" class="form-control auth-input" required />
    </div>

    <div class="form-group">
      <label>{{ _('E-mail') }}</label>

      <input
        type="email"
        name="email"
        class="form-control auth-input"
        required
      />
    </div>

    <div class="form-group">
      <label>{{ _('Password') }}</label>

      <input
        type="password"
        name="password"
        class="form-control auth-input"
        required
      />
    </div>

    <div class="form-group">
      <label>{{ _('Location') }}</label>

      <input
        type="text"
        name="location"
        class="form-control auth-input"
        required
      />
    </div>

    <button class="btn btn-success btn-block">
      <i class="fas fa-user-plus"></i> {{ _('Register') }}
    </button>
  </form>

  <p class="text-center mt-3">
    {{ _('Already registered') }}

    <a href="/login">{{ _('Login') }}</a>
  </p>
</div>

{% endblock %}
